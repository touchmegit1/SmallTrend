# Application Configuration
spring.application.name=smalltrend-backend
server.port=${SERVER_PORT:8081}
spring.config.import=optional:file:.env[.properties]

# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smalltrend?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration 
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.sql.init.continue-on-error=true
spring.sql.init.encoding=UTF-8
authentication.manager.enable=true
## Enforce snake_case naming for tables/columns automatically (Hibernate 6)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# JWT Configuration
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret}

# Logging Configuration
logging.level.com.smalltrend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Price expiry alert notifications
app.notifications.price-expiry.recipient=${PRICE_EXPIRY_ALERT_RECIPIENT:admin.smalltrend.swp@gmail.com}
app.notifications.price-expiry.days-before=${PRICE_EXPIRY_ALERT_DAYS_BEFORE:1}
app.notifications.price-expiry.cron=${PRICE_EXPIRY_ALERT_CRON:0 */10 * * * *}
app.notifications.price-expiry.auto-inactive-cron=${PRICE_EXPIRY_AUTO_INACTIVE_CRON:0 */10 * * * *}

# Inventory out-of-stock notifications
app.notifications.inventory.out-of-stock.recipients=${APP_NOTIFICATIONS_INVENTORY_OUT_OF_STOCK_RECIPIENTS:}
app.notifications.inventory.out-of-stock.daily-enabled=${APP_NOTIFICATIONS_INVENTORY_OUT_OF_STOCK_DAILY_ENABLED:true}
app.notifications.inventory.out-of-stock.daily-cron=${APP_NOTIFICATIONS_INVENTORY_OUT_OF_STOCK_DAILY_CRON:0 05 7 * * *}

# CORS Configuration
# Comma-separated list of allowed origins (supports patterns like https://*.devtunnels.ms)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}
app.notifications.inventory.expired-batch.daily-enabled=${APP_NOTIFICATIONS_INVENTORY_EXPIRED_BATCH_DAILY_ENABLED:true}
app.notifications.inventory.expired-batch.daily-cron=${APP_NOTIFICATIONS_INVENTORY_EXPIRED_BATCH_DAILY_CRON:0 15 7 * * *}