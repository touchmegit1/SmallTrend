services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smalltrend}
      MYSQL_USER: ${DB_USERNAME:-smalltrend}
      MYSQL_PASSWORD: ${DB_PASSWORD:-1234}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root1234}
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    image: ${REGISTRY:-docker.io}/${IMAGE_NAMESPACE}/smalltrend-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./deploy/env/backend.env
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    image: ${REGISTRY:-docker.io}/${IMAGE_NAMESPACE}/smalltrend-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"

volumes:
  mysql_data:
  uploads_data:
