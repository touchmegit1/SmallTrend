name: CI

on:
  push:
    branches: [main, dev, shift]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel redundant runs when a new push is made to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Lint & Build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    name: Backend (Build & Test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DB_URL: jdbc:h2:mem:smalltrend-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
      DB_USERNAME: sa
      DB_PASSWORD: ""
      JWT_SECRET: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      CLOUDINARY_CLOUD_NAME: ci_dummy
      CLOUDINARY_API_KEY: "000000000000000"
      CLOUDINARY_API_SECRET: ci_dummy_secret
      SPRING_SQL_INIT_MODE: never
      SPRING_JPA_DDL_AUTO: create-drop
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and run tests
        run: ./mvnw -B clean verify -Dspring.datasource.url="jdbc:h2:mem:smalltrend-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE" -Dspring.datasource.driver-class-name=org.h2.Driver -Dspring.datasource.username=sa -Dspring.datasource.password= -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect -Dspring.jpa.hibernate.ddl-auto=create-drop -Dspring.sql.init.mode=never
